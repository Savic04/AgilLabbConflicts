<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Task Manager Pro</h1>

  <form id="task-form">
    <input type="text" id="task-input" placeholder="Tasks need to be done.." required />
    <label>
      <input type="checkbox" id="priority-check" /> Priority
    </label>
    <button type="submit">+ Add</button>
  </form>

  <ul id="task-list"></ul>

  <script src="app.js"></script>
</body>
</html>
